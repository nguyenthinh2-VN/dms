spring:
  datasource:
    url: jdbc:mysql://localhost:3306/dms_db?useSSL=false&serverTimezone=UTC
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration: 86400000 # 24 hours in milliseconds

app:
  frontend:
    url: http://localhost:3000 # URL frontend

  rate-limit:
    capacity: 10
    minutes: 1

  contract:
    storage-path: ./storage/contracts   # dev: local disk
